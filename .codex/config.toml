# Project-scoped Codex configuration for this causal policy evaluation system.
# Codex loads project .codex layers only after you trust the repository.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
model_reasoning_effort = "high"
model_verbosity = "medium"

[sandbox_workspace_write]
network_access = false

[agents]
max_threads = 8
max_depth = 1
job_max_runtime_seconds = 1800

